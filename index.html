<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Library</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f0f0f;
    color:white;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

header{
    height:70px;
    background:#1b1b1b;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 25px;
    border-bottom:2px solid #2c2c2c;
}

header h1{
    font-size:28px;
}

.upload-btn{
    background:#4CAF50;
    padding:10px 18px;
    border-radius:10px;
    cursor:pointer;
    transition:0.2s;
}

.upload-btn:hover{
    background:#43a047;
}

input{
    display:none;
}

.container{
    display:flex;
    height:calc(100vh - 70px);
}

.sidebar{
    width:230px;
    background:#161616;
    border-right:2px solid #222;
    padding:20px;
}

.sidebar h2{
    margin-bottom:20px;
    color:#bbbbbb;
}

.sidebar p{
    margin:10px 0;
    color:#888;
    cursor:pointer;
    transition:0.2s;
}

.sidebar p:hover{
    color:white;
}

.main{
    flex:1;
    padding:25px;
    overflow-y:auto;
}

.games-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:25px;
}

.game-card{
    background:#1a1a1a;
    border-radius:18px;
    overflow:hidden;
    transition:0.25s;
    cursor:pointer;
    border:2px solid transparent;
}

.game-card:hover{
    transform:translateY(-5px);
    border-color:#4CAF50;
}

.game-cover{
    height:260px;
    background:linear-gradient(135deg,#333,#222);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:60px;
}

.game-info{
    padding:15px;
}

.game-title{
    font-size:20px;
    margin-bottom:8px;
}

.game-desc{
    color:#999;
    font-size:14px;
}

.player{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.92);
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:999;
}

.player-top{
    width:90%;
    display:flex;
    justify-content:flex-end;
    margin-bottom:10px;
    gap:10px;
}

.player-top button{
    background:#2c2c2c;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
}

.player-top button:hover{
    background:#444;
}

.game-window{
    width:90%;
    height:85%;
    background:black;
    border-radius:18px;
    overflow:hidden;
    border:2px solid #333;
}

iframe{
    width:100%;
    height:100%;
    border:none;
    background:white;
}
</style>
</head>
<body>

<header>
    <h1>🎮 My Game Library</h1>

    <label class="upload-btn">
        + Добавить игру
        <input type="file" id="fileInput" accept=".html">
    </label>
</header>

<div class="container">

    <div class="sidebar">
        <h2>Библиотека</h2>
        <p>🎮 Все игры</p>
        <p>⭐ Избранное</p>
        <p>🕹 HTML5</p>
        <p>💾 Локальные игры</p>
    </div>

    <div class="main">
        <div class="games-grid" id="gamesGrid">

        </div>
    </div>

</div>

<div class="player" id="player">

    <div class="player-top">
        <button onclick="fullscreenGame()">⛶ Полный экран</button>
        <button onclick="closePlayer()">✕ Закрыть</button>
    </div>

    <div class="game-window" id="gameWindow">
        <iframe id="gameFrame"></iframe>
    </div>

</div>

<script>
const gamesGrid = document.getElementById("gamesGrid");
const gameFrame = document.getElementById("gameFrame");
const player = document.getElementById("player");

document.getElementById("fileInput").addEventListener("change", function(e){

    const file = e.target.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(event){

        const html = event.target.result;

        const card = document.createElement("div");
        card.className = "game-card";

        card.innerHTML = `
            <div class="game-cover">🎮</div>

            <div class="game-info">
                <div class="game-title">${file.name}</div>
                <div class="game-desc">HTML Game</div>
            </div>
        `;

        card.onclick = () => {
            gameFrame.srcdoc = html;
            player.style.display = "flex";
        };

        gamesGrid.appendChild(card);

    };

    reader.readAsText(file);

});

function closePlayer(){
    player.style.display = "none";
    gameFrame.srcdoc = "";
}

function fullscreenGame(){

    const gameWindow = document.getElementById("gameWindow");

    if(gameWindow.requestFullscreen){
        gameWindow.requestFullscreen();
    }

}
</script>

</body>
</html>
